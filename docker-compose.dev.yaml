services:
  postgres:
    image: postgres:16-alpine
    container_name: mux-gateway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mux_gateway
    ports:
      - "5435:5432"
    volumes:
      - mux_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mux_gateway"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mux-gateway-redis
    restart: unless-stopped
    ports:
      - "6383:6379"
    volumes:
      - mux_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mux_postgres_data:
  mux_redis_data:
