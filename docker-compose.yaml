name: mux-gateway

x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
  image: mux-gateway-app

services:
  postgres:
    image: postgres:16-alpine
    container_name: mux-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mux_gateway
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mux_gateway"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mux-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  gateway:
    <<: *app
    container_name: mux-gateway
    restart: unless-stopped
    environment:
      API_PORT: "${API_PORT:-8000}"
      AUTH_COOKIE_SECURE: "${AUTH_COOKIE_SECURE:-false}"
      AUTH_SECRET: "${AUTH_SECRET:-dev-change-me}"
      CLIENT_ORIGINS: "${CLIENT_ORIGINS:-http://localhost:3000}"
      DATABASE_URL: "${DOCKER_DATABASE_URL:-********************************************/mux_gateway?schema=public}"
      REDIS_URL: "${DOCKER_REDIS_URL:-redis://redis:6379}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
      MISTRAL_API_KEY: "${MISTRAL_API_KEY:-}"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "pnpm db:push && pnpm start"

  platform:
    <<: *app
    container_name: mux-platform
    restart: unless-stopped
    environment:
      VITE_API_URL: "${VITE_API_URL:-http://localhost:8000}"
    ports:
      - "3000:3000"
    depends_on:
      gateway:
        condition: service_started
    command: pnpm --filter @repo/platform dev

volumes:
  postgres_data:
  redis_data:
