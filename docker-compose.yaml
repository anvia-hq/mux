name: mux-gateway

x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
  image: mux-gateway-app

services:
  postgres:
    image: postgres:16-alpine
    container_name: mux-postgres
    restart: unless-stopped
    # No ports exposed - internal network only
    expose:
      - "5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mux_gateway
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mux_gateway"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: mux-redis
    restart: unless-stopped
    # No ports exposed - internal network only
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  gateway:
    <<: *app
    container_name: mux-gateway
    restart: unless-stopped
    # No ports exposed - only Caddy proxies to it
    expose:
      - "8000"
    environment:
      API_PORT: "${API_PORT:-8000}"
      AUTH_COOKIE_SECURE: "${AUTH_COOKIE_SECURE:-true}"
      AUTH_SECRET: "${AUTH_SECRET:-dev-change-me}"
      CLIENT_ORIGINS: "${CLIENT_ORIGINS:-http://localhost}"
      DATABASE_URL: "${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/mux_gateway?schema=public}"
      REDIS_URL: "${DOCKER_REDIS_URL:-redis://redis:6379}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
      MISTRAL_API_KEY: "${MISTRAL_API_KEY:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "pnpm --filter @repo/api db:push && pnpm --filter @repo/api start"
    networks:
      - internal

  platform:
    <<: *app
    container_name: mux-platform
    restart: unless-stopped
    # No ports exposed - only Caddy proxies to it
    expose:
      - "3000"
    environment:
      VITE_API_URL: "${VITE_API_URL:-/api}"
    depends_on:
      gateway:
        condition: service_started
    command: pnpm --filter @repo/platform dev
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: mux-caddy
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gateway
      - platform
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
